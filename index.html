<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Archive CMS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#0f172a;color:white;display:flex;min-height:100vh;}

.login-screen{
    position:fixed;inset:0;background:#0f172a;
    display:flex;justify-content:center;align-items:center;flex-direction:column;z-index:999;
}
.login-box{
    background:rgba(255,255,255,0.05);
    padding:25px;border-radius:15px;
    display:flex;flex-direction:column;gap:10px;width:260px;
}
.login-box input{padding:10px;border-radius:8px;border:none;}
.login-box button{padding:10px;border-radius:8px;border:none;background:#2563eb;color:white;cursor:pointer;}

.sidebar{
    width:260px;background:rgba(255,255,255,0.05);
    padding:25px;border-right:1px solid rgba(255,255,255,0.1);
}
.logo{font-size:28px;font-weight:bold;margin-bottom:20px;}

.nav button{
    width:100%;margin-bottom:8px;padding:12px;
    border:none;border-radius:10px;background:none;color:white;cursor:pointer;
}
.nav button:hover{background:rgba(255,255,255,0.1);}

.content{flex:1;padding:30px;}
.card{background:rgba(255,255,255,0.05);padding:20px;border-radius:15px;margin-bottom:15px;}
.hidden{display:none;}

input,textarea{width:100%;padding:10px;margin-top:10px;border-radius:10px;border:none;}
button{margin-top:10px;padding:8px 12px;border-radius:8px;border:none;cursor:pointer;}
</style>
</head>

<body>

<!-- 🔐 로그인 -->
<div class="login-screen" id="loginScreen">
    <h2>🔐 Login</h2>

    <div class="login-box">
        <input id="su_id" placeholder="회원가입 ID">
        <input id="su_pw" placeholder="회원가입 PW" type="password">
        <button onclick="signup()">가입</button>

        <hr style="opacity:0.2">

        <input id="li_id" placeholder="로그인 ID">
        <input id="li_pw" placeholder="로그인 PW" type="password">
        <button onclick="login()">로그인</button>
    </div>

    <p id="msg"></p>
</div>

<!-- 🔓 사이드 -->
<div class="sidebar">
    <div class="logo">📁 CMS</div>

    <div class="nav">
        <button onclick="show('home')">홈</button>
        <button onclick="show('posts')">게시판</button>
        <button onclick="show('admin')" id="adminBtn" style="display:none;">관리자</button>
    </div>

    <button onclick="logout()">로그아웃</button>
</div>

<!-- 🔓 콘텐츠 -->
<div class="content">

<section id="home">
<div class="card">
<h2>환영 👋</h2>
<p>유저 + 관리자 승인 CMS</p>
</div>
</section>

<!-- 📝 게시판 -->
<section id="posts" class="hidden">
<div class="card">
<h2>📝 게시판</h2>

<textarea id="postText" placeholder="글 작성"></textarea>
<button onclick="addPost()">작성</button>

<div id="postList"></div>
</div>
</section>

<!-- 🛠 관리자 -->
<section id="admin" class="hidden">
<div class="card">
<h2>🛠 관리자 승인 대기</h2>
<div id="adminList"></div>
</div>
</section>

</div>

<script>

// ===== DB =====
function getData(k){return JSON.parse(localStorage.getItem(k)||"[]");}
function saveData(k,v){localStorage.setItem(k,JSON.stringify(v));}

// ===== 로그인 =====
function signup(){
    let id=su_id.value;
    let pw=su_pw.value;
    if(!id||!pw) return;

    localStorage.setItem("user_"+id,pw);
    alert("가입 완료");
}

function login(){
    let id=li_id.value;
    let pw=li_pw.value;

    if(id==="JongHwang" && pw==="Jonghwang"){
        localStorage.setItem("role","admin");
        enterSite();
        return;
    }

    let saved=localStorage.getItem("user_"+id);

    if(saved===pw){
        localStorage.setItem("role","user");
        localStorage.setItem("currentUser",id);
        enterSite();
    }else{
        msg.innerText="로그인 실패";
    }
}

// ===== 자동 로그인 =====
window.onload=function(){
    if(localStorage.getItem("loggedIn")==="true"){
        enterSite();
    }
}

// ===== 진입 =====
function enterSite(){
    loginScreen.style.display="none";

    localStorage.setItem("loggedIn","true");

    if(localStorage.getItem("role")==="admin"){
        adminBtn.style.display="block";
    }

    loadPosts();
    loadAdmin();
}

// ===== 로그아웃 =====
function logout(){
    localStorage.removeItem("loggedIn");
    localStorage.removeItem("role");
    location.reload();
}

// ===== 페이지 =====
function show(id){
    document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

// ===== 게시글 작성 =====
function addPost(){
    let role=localStorage.getItem("role");
    let user=localStorage.getItem("currentUser")||"guest";

    let d=getData("posts");

    d.push({
        id:Date.now(),
        text:postText.value,
        author:user,
        status: role==="admin" ? "approved":"pending"
    });

    saveData("posts",d);
    loadPosts();
    loadAdmin();
}

// ===== 게시글 출력 (승인만) =====
function loadPosts(){
    let role=localStorage.getItem("role");
    let d=getData("posts");

    let list = d.filter(p=> role==="admin" || p.status==="approved");

    postList.innerHTML=list.map(i=>
        `<div class="card">
            ${i.text}
            <br>
            <small>${i.author} / ${i.status}</small>
            ${role==="admin" && i.status==="pending"
                ? `<button onclick="approve(${i.id})">승인</button>`:""}
            <button onclick="deletePost(${i.id})">삭제</button>
        </div>`
    ).join("");
}

// ===== 관리자 대기 =====
function loadAdmin(){
    let d=getData("posts").filter(p=>p.status==="pending");

    adminList.innerHTML=d.map(i=>
        `<div class="card">
            ${i.text}
            <br>
            <small>${i.author}</small>
            <button onclick="approve(${i.id})">승인</button>
            <button onclick="deletePost(${i.id})">삭제</button>
        </div>`
    ).join("");
}

// ===== 승인 =====
function approve(id){
    let d=getData("posts");

    d=d.map(p=>{
        if(p.id===id) p.status="approved";
        return p;
    });

    saveData("posts",d);
    loadPosts();
    loadAdmin();
}

// ===== 삭제 =====
function deletePost(id){
    let d=getData("posts").filter(p=>p.id!==id);
    saveData("posts",d);
    loadPosts();
    loadAdmin();
}

</script>

</body>
</html>
