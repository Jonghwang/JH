<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Archive CMS</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    display:flex;
    min-height:100vh;
}

/* ===== 로그인 ===== */
.login-screen{
    position:fixed;
    inset:0;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

.login-box{
    background:rgba(255,255,255,0.05);
    padding:25px;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
    width:260px;
}

.login-box input{
    padding:10px;
    border:none;
    border-radius:8px;
}

.login-box button{
    padding:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;
    color:white;
}

/* ===== 레이아웃 ===== */
.sidebar{
    width:260px;
    background:rgba(255,255,255,0.05);
    padding:25px;
    border-right:1px solid rgba(255,255,255,0.1);
}

.logo{
    font-size:28px;
    font-weight:bold;
    margin-bottom:30px;
}

.nav button{
    width:100%;
    margin-bottom:8px;
    padding:12px;
    border:none;
    border-radius:10px;
    background:none;
    color:white;
    cursor:pointer;
}

.nav button:hover{
    background:rgba(255,255,255,0.1);
}

.content{
    flex:1;
    padding:30px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:15px;
    margin-bottom:15px;
}

.hidden{display:none;}

input,textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
    border:none;
}

button{
    margin-top:10px;
    cursor:pointer;
    padding:8px 12px;
    border-radius:8px;
    border:none;
}
</style>
</head>

<body>

<!-- 🔐 로그인 -->
<div class="login-screen" id="loginScreen">
    <h2>🔐 Login</h2>

    <div class="login-box">
        <input id="su_id" placeholder="회원가입 ID">
        <input id="su_pw" placeholder="회원가입 PW" type="password">
        <button onclick="signup()">가입</button>

        <hr style="opacity:0.2">

        <input id="li_id" placeholder="로그인 ID">
        <input id="li_pw" placeholder="로그인 PW" type="password">
        <button onclick="login()">로그인</button>
    </div>

    <p id="msg"></p>
</div>

<!-- 🔓 사이드바 -->
<div class="sidebar">
    <div class="logo">📁 CMS</div>

    <div class="nav">
        <button onclick="show('home')">홈</button>
        <button onclick="show('study')">공부</button>
        <button onclick="show('gallery')">갤러리</button>
        <button onclick="show('files')">자료실</button>
        <button onclick="show('admin')" id="adminBtn" style="display:none;">관리자</button>
    </div>
</div>

<!-- 🔓 콘텐츠 -->
<div class="content">

<!-- 홈 -->
<section id="home">
<div class="card">
<h2>환영 👋</h2>
<p>관리형 CMS 사이트</p>
</div>
</section>

<!-- 공부 -->
<section id="study" class="hidden">
<div class="card">
<h2>📚 공부</h2>
<input id="studyInput" placeholder="공부 내용">
<button onclick="addStudy()">추가</button>
<div id="studyList"></div>
</div>
</section>

<!-- 갤러리 -->
<section id="gallery" class="hidden">
<div class="card">
<h2>🖼 갤러리</h2>
<input id="galleryInput" placeholder="이미지 URL">
<button onclick="addGallery()">추가</button>
<div id="galleryList"></div>
</div>
</section>

<!-- 자료실 -->
<section id="files" class="hidden">
<div class="card">
<h2>📁 자료실</h2>
<input id="fileInput" placeholder="자료 내용">
<button onclick="addFile()">추가</button>
<div id="fileList"></div>
</div>
</section>

<!-- 🛠 관리자 -->
<section id="admin" class="hidden">
<div class="card">
<h2>🛠 관리자 게시판</h2>

<textarea id="postText" rows="4" placeholder="글 작성"></textarea>
<button onclick="addPost()">글 올리기</button>

<div id="postList"></div>
</div>
</section>

</div>

<script>

// ===== DB =====
function getData(k){
    return JSON.parse(localStorage.getItem(k) || "[]");
}
function saveData(k,v){
    localStorage.setItem(k,JSON.stringify(v));
}

// ===== 로그인 =====
function signup(){
    let id=su_id.value;
    let pw=su_pw.value;
    if(!id||!pw) return;

    localStorage.setItem("user_"+id,pw);
    alert("가입 완료");
}

function login(){
    let id=li_id.value;
    let pw=li_pw.value;

    if(id==="JongHwang" && pw==="Jonghwang"){
        localStorage.setItem("role","admin");
        enterSite();
        return;
    }

    let saved=localStorage.getItem("user_"+id);

    if(saved===pw){
        localStorage.setItem("role","user");
        enterSite();
    }else{
        msg.innerText="로그인 실패";
    }
}

function enterSite(){
    loginScreen.style.display="none";

    if(localStorage.getItem("role")==="admin"){
        adminBtn.style.display="block";
    }

    loadAll();
}

// ===== 페이지 =====
function show(id){
    document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

// ===== 공부 =====
function addStudy(){
    let d=getData("study");
    d.push({id:Date.now(),text:studyInput.value});
    saveData("study",d);
    loadStudy();
}

function deleteStudy(id){
    saveData("study",getData("study").filter(i=>i.id!==id));
    loadStudy();
}

function loadStudy(){
    studyList.innerHTML = getData("study").map(i=>
        `<div class="card">${i.text}<button onclick="deleteStudy(${i.id})">삭제</button></div>`
    ).join("");
}

// ===== 갤러리 =====
function addGallery(){
    let d=getData("gallery");
    d.push({id:Date.now(),url:galleryInput.value});
    saveData("gallery",d);
    loadGallery();
}

function deleteGallery(id){
    saveData("gallery",getData("gallery").filter(i=>i.id!==id));
    loadGallery();
}

function loadGallery(){
    galleryList.innerHTML = getData("gallery").map(i=>
        `<div class="card"><img src="${i.url}" style="max-width:100%"><button onclick="deleteGallery(${i.id})">삭제</button></div>`
    ).join("");
}

// ===== 자료실 =====
function addFile(){
    let d=getData("files");
    d.push({id:Date.now(),text:fileInput.value});
    saveData("files",d);
    loadFiles();
}

function deleteFile(id){
    saveData("files",getData("files").filter(i=>i.id!==id));
    loadFiles();
}

function loadFiles(){
    fileList.innerHTML = getData("files").map(i=>
        `<div class="card">${i.text}<button onclick="deleteFile(${i.id})">삭제</button></div>`
    ).join("");
}

// ===== 관리자 =====
function addPost(){
    let d=getData("posts");
    d.push({id:Date.now(),text:postText.value});
    saveData("posts",d);
    loadPosts();
}

function deletePost(id){
    saveData("posts",getData("posts").filter(i=>i.id!==id));
    loadPosts();
}

function loadPosts(){
    postList.innerHTML = getData("posts").map(i=>
        `<div class="card">${i.text}<button onclick="deletePost(${i.id})">삭제</button></div>`
    ).join("");
}

// ===== 전체 =====
function loadAll(){
    loadStudy();
    loadGallery();
    loadFiles();
    loadPosts();
}

</script>

</body>
</html>
