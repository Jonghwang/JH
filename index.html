<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My CMS</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#0f172a;color:white;display:flex;min-height:100vh;}

.login{
    position:fixed;inset:0;
    display:flex;justify-content:center;align-items:center;
    background:#0f172a;z-index:999;
}

.box{
    background:rgba(255,255,255,0.05);
    padding:25px;border-radius:15px;
    width:260px;display:flex;flex-direction:column;gap:10px;
}

input,textarea{
    padding:10px;border:none;border-radius:8px;
}

button{
    padding:8px;border:none;border-radius:8px;
    cursor:pointer;
}

.sidebar{
    width:240px;background:rgba(255,255,255,0.05);
    padding:20px;
}

.content{
    flex:1;padding:25px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:15px;border-radius:12px;margin-bottom:10px;
}

.hidden{display:none;}
</style>
</head>

<body>

<!-- 🔐 로그인 -->
<div class="login" id="loginBox">
<div class="box">
<h3>LOGIN</h3>

<input id="id" placeholder="ID">
<input id="pw" type="password" placeholder="PW">
<button onclick="login()">로그인</button>

<hr style="opacity:0.2">

<input id="nid" placeholder="회원가입 ID">
<input id="npw" type="password" placeholder="PW">
<button onclick="signup()">가입</button>

<p id="msg"></p>
</div>
</div>

<!-- 📌 사이드 -->
<div class="sidebar">
<h3>CMS</h3>

<button onclick="show('home')">홈</button>
<button onclick="show('board')">게시판</button>
<button onclick="show('admin')" id="adminBtn" style="display:none;">관리자</button>

<button onclick="logout()">로그아웃</button>
</div>

<!-- 📌 컨텐츠 -->
<div class="content">

<section id="home">
<div class="card">환영 👋</div>
</section>

<!-- 게시판 -->
<section id="board" class="hidden">
<div class="card">

<h3>게시판</h3>

<textarea id="text"></textarea>
<button onclick="addPost()">작성</button>

<div id="list"></div>

</div>
</section>

<!-- 관리자 -->
<section id="admin" class="hidden">
<div class="card">
<h3>승인 대기</h3>
<div id="adminList"></div>
</div>
</section>

</div>

<script>

// ===== 데이터 =====
const get = k => JSON.parse(localStorage.getItem(k)||"[]");
const set = (k,v)=>localStorage.setItem(k,JSON.stringify(v));

// ===== 회원가입 =====
function signup(){
    let i=nid.value, p=npw.value;
    localStorage.setItem("u_"+i,p);
    alert("가입완료");
}

// ===== 로그인 =====
function login(){
    let i=id.value, p=pw.value;

    if(i==="JongHwang" && p==="Jonghwang"){
        localStorage.setItem("role","admin");
        localStorage.setItem("login","1");
        enter();
        return;
    }

    if(localStorage.getItem("u_"+i)===p){
        localStorage.setItem("role","user");
        localStorage.setItem("user",i);
        localStorage.setItem("login","1");
        enter();
    }else{
        msg.innerText="실패";
    }
}

// ===== 자동 로그인 =====
window.onload=()=>{
    if(localStorage.getItem("login")==="1") enter();
}

// ===== 진입 =====
function enter(){
    loginBox.style.display="none";
    if(localStorage.getItem("role")==="admin") adminBtn.style.display="block";
    load();
}

// ===== 로그아웃 =====
function logout(){
    localStorage.clear();
    location.reload();
}

// ===== 화면 =====
function show(id){
    document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

// ===== 글쓰기 (유저 가능) =====
function addPost(){
    let d=get("posts");

    let role=localStorage.getItem("role");
    let user=localStorage.getItem("user")||"guest";

    d.push({
        id:Date.now(),
        text:text.value,
        user:user,
        status: role==="admin" ? "approved":"pending"
    });

    set("posts",d);
    load();
}

// ===== 게시판 =====
function load(){
    let role=localStorage.getItem("role");
    let d=get("posts");

    let showList = d.filter(i=>{
        return role==="admin" || i.status==="approved";
    });

    list.innerHTML=showList.map(i=>
        `<div class="card">
            ${i.text}
            <br>
            <small>${i.user} / ${i.status}</small>
        </div>`
    ).join("");

    // 관리자 리스트
    if(role==="admin"){
        adminList.innerHTML=d.filter(i=>i.status==="pending").map(i=>
            `<div class="card">
                ${i.text}
                <br>
                <small>${i.user}</small>
                <button onclick="approve(${i.id})">승인</button>
            </div>`
        ).join("");
    }
}

// ===== 승인 =====
function approve(id){
    let d=get("posts").map(i=>{
        if(i.id===id) i.status="approved";
        return i;
    });

    set("posts",d);
    load();
}

</script>

</body>
</html>
