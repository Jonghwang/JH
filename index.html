<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Board</title>

<!-- Firebase (웹용 compat) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:white;
    padding:20px;
}

button,input{
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

button{
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

.card{
    background:rgba(255,255,255,0.08);
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}
</style>
</head>

<body>

<h2>🔥 Firebase 게시판</h2>

<!-- 로그인 -->
<div id="loginBox">
    <button onclick="login()">구글 로그인</button>
</div>

<!-- 앱 -->
<div id="app" style="display:none;">
    <p id="user"></p>

    <input id="text" placeholder="글 입력">
    <button onclick="addPost()">글쓰기</button>

    <button onclick="logout()">로그아웃</button>

    <div id="list"></div>
</div>

<script>

// =====================
// 🔥 Firebase 설정
// =====================
const firebaseConfig = {
  apiKey: "AIzaSyCEUja-Qv2pfi6cXsYXFhlrJi7mikzB7xQ",
  authDomain: "jonghwang-740ea.firebaseapp.com",
  projectId: "jonghwang-740ea",
  storageBucket: "jonghwang-740ea.firebasestorage.app",
  messagingSenderId: "860043333916",
  appId: "1:860043333916:web:91ace7d03c50371c33aad9",
  measurementId: "G-TCHHPS1H5M"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();


// =====================
// 🔥 로그인 (redirect 방식)
// =====================
function login(){
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithRedirect(provider);
}

// 로그인 결과 처리
auth.getRedirectResult().then(result=>{
    if(result.user){
        console.log("로그인 성공:", result.user);
    }
});


// =====================
// 🔥 상태 체크
// =====================
auth.onAuthStateChanged(user=>{
    if(user){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";
        document.getElementById("user").innerText = "👤 " + user.displayName;

        loadPosts();
    }else{
        document.getElementById("loginBox").style.display="block";
        document.getElementById("app").style.display="none";
    }
});


// =====================
// 🔥 글쓰기
// =====================
function addPost(){
    const user = auth.currentUser;
    if(!user) return alert("로그인 필요");

    const text = document.getElementById("text").value;

    db.collection("posts").add({
        text:text,
        name:user.displayName,
        uid:user.uid,
        time:Date.now()
    });

    document.getElementById("text").value="";
}


// =====================
// 🔥 글 불러오기
// =====================
function loadPosts(){
    db.collection("posts")
    .orderBy("time")
    .onSnapshot(snapshot=>{
        let html="";

        snapshot.forEach(doc=>{
            let d = doc.data();

            html += `
            <div class="card">
                <b>${d.name}</b><br>
                ${d.text}
            </div>`;
        });

        document.getElementById("list").innerHTML = html;
    });
}


// =====================
// 🔥 로그아웃
// =====================
function logout(){
    auth.signOut();
}

</script>

</body>
</html>
