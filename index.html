<script>

// =====================
// 🔥 Firebase 설정
// =====================
const firebaseConfig = {
  apiKey: "AIzaSyCEUja-Qv2pfi6cXsYXFhlrJi7mikz7bXQ",
  authDomain: "jonghwang-740ea.firebaseapp.com",
  projectId: "jonghwang-740ea",
  storageBucket: "jonghwang-740ea.firebasestorage.app",
  messagingSenderId: "860043333916",
  appId: "1:860043333916:web:67a6f08cdfd01f3933aad9",
  measurementId: "G-KBBT5XCHJ9"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();


// =====================
// 🔥 로그인
// =====================
function login(){
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithRedirect(provider);
}

// 로그인 결과 처리
auth.getRedirectResult().catch(error=>{
    console.error(error);
});

// =====================
// 🔥 로그인 상태 확인
// =====================
auth.onAuthStateChanged(user=>{
    if(user){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";
        document.getElementById("user").innerText = "👤 " + user.displayName;

        loadPosts();
    }else{
        document.getElementById("loginBox").style.display="block";
        document.getElementById("app").style.display="none";
    }
});

// =====================
// 🔥 글쓰기
// =====================
function addPost(){
    const user = auth.currentUser;
    if(!user){
        alert("로그인 필요");
        return;
    }

    const text = document.getElementById("text").value.trim();

    if(!text){
        alert("내용 입력");
        return;
    }

    db.collection("posts").add({
        text: text,
        name: user.displayName,
        uid: user.uid,
        time: Date.now()
    });

    document.getElementById("text").value="";
}

// =====================
// 🔥 게시글 불러오기
// =====================
function loadPosts(){
    db.collection("posts")
    .orderBy("time","desc")
    .onSnapshot(snapshot=>{

        let html="";

        snapshot.forEach(doc=>{

            const d = doc.data();

            html += `
            <div class="card">
                <b>${d.name}</b><br>
                ${d.text}
            </div>
            `;
        });

        document.getElementById("list").innerHTML = html;
    });
}

// =====================
// 🔥 로그아웃
// =====================
function logout(){
    auth.signOut();
}

</script>
