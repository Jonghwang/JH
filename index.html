<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Firebase Board</title>

<!-- Firebase SDK (웹용 compat) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
    font-family:sans-serif;
    background:#0f172a;
    color:white;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.06);
    padding:15px;
    border-radius:12px;
    margin-top:10px;
}

input,button{
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

button{
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}
</style>
</head>

<body>

<h2>🔥 Firebase 게시판</h2>

<!-- 로그인 -->
<div id="loginBox">
    <button onclick="login()">구글 로그인</button>
</div>

<!-- 앱 -->
<div id="app" style="display:none;">
    <p id="user"></p>

    <input id="text" placeholder="글 입력">
    <button onclick="addPost()">글쓰기</button>

    <button onclick="logout()">로그아웃</button>

    <div id="list"></div>
</div>

<script>

// 🔥 Firebase 설정 (너 프로젝트)
const firebaseConfig = {
  apiKey: "AIzaSyCEUja-Qv2pfi6cXsYXFhlrJi7mikzB7xQ",
  authDomain: "jonghwang-740ea.firebaseapp.com",
  projectId: "jonghwang-740ea",
  storageBucket: "jonghwang-740ea.firebasestorage.app",
  messagingSenderId: "860043333916",
  appId: "1:860043333916:web:91ace7d03c50371c33aad9",
  measurementId: "G-TCHHPS1H5M"
};

// 초기화
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// 🔥 구글 로그인
function login(){
    const provider = new firebase.auth.GoogleAuthProvider();

    auth.signInWithPopup(provider)
    .then(result=>{
        console.log(result.user);
    });
}

// 🔥 로그인 상태 체크
auth.onAuthStateChanged(user=>{
    if(user){
        document.getElementById("loginBox").style.display="none";
        document.getElementById("app").style.display="block";
        document.getElementById("user").innerText="👤 " + user.displayName;

        loadPosts();
    }else{
        document.getElementById("loginBox").style.display="block";
        document.getElementById("app").style.display="none";
    }
});

// 🔥 글쓰기
function addPost(){
    const user = auth.currentUser;

    if(!user){
        alert("로그인 필요");
        return;
    }

    db.collection("posts").add({
        text: document.getElementById("text").value,
        name: user.displayName,
        uid: user.uid,
        time: Date.now()
    });

    document.getElementById("text").value="";
}

// 🔥 실시간 불러오기
function loadPosts(){
    db.collection("posts")
    .orderBy("time")
    .onSnapshot(snapshot=>{
        let html="";

        snapshot.forEach(doc=>{
            let d = doc.data();

            html += `
            <div class="card">
                <b>${d.name}</b><br>
                ${d.text}
            </div>`;
        });

        document.getElementById("list").innerHTML = html;
    });
}

// 🔥 로그아웃
function logout(){
    auth.signOut();
}

</script>

</body>
</html>
